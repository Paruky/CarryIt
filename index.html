<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="indexStyle.css">
    <title>CarryIt</title>
    <script>
        let currentStage = 1;
        let maxStage = 5;
        function back() {
            if (currentStage > 1) {
                currentStage--;
                document.getElementById("StageNumber").textContent = currentStage;
            }
        }
        function next() {
            if (currentStage < maxStage) {
                currentStage++;
                document.getElementById("StageNumber").textContent = currentStage;
            }
        }
        function startGame() {
            window.location.href = "stage" + currentStage + ".html";
        }
    </script>
</head>
<body class="index">
    <h1>CarryIt</h1>
    <h2>ステージ選択</h2>
    <button id="back" onclick="back()"><</button>
    <div id="SelectedStage"><span id="StageNumber">1</span></div>
    <button id="next" onclick="next()">></button><br>
    <button class="StartBtn" onclick="startGame()">START</button>
</body>
</html>
